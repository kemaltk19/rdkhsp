server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Statik varlıklar
    location /assets/ {
        try_files $uri =404;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — history-mode router için tüm yolları index.html'e düşür.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml font/woff2;
    gzip_min_length 1024;
}
